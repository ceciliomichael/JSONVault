<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Base Hexagon -->
  <path d="M 100 35 L 160 70 L 160 130 L 100 165 L 40 130 L 40 70 Z" 
        fill="#27272a" 
        stroke="#27272a" 
        stroke-width="20" 
        stroke-linejoin="round" />
        
  <!-- Left Brace -->
  <path d="M 85 65 
           C 70 65, 65 75, 65 85 
           C 65 95, 55 100, 45 100 
           C 55 100, 65 105, 65 115 
           C 65 125, 70 135, 85 135" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Right Brace -->
  <path d="M 115 65 
           C 130 65, 135 75, 135 85 
           C 135 95, 145 100, 155 100 
           C 145 100, 135 105, 135 115 
           C 135 125, 130 135, 115 135" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Data Core -->
  <circle cx="100" cy="100" r="10" fill="#ffffff" />
</svg>