services:
  jsonvault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jsonvault
    restart: unless-stopped
    ports:
      - "5766:5766"
    volumes:
      # Data is stored in the parent JSONVault directory
      - ../data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5766/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
